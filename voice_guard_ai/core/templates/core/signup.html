{% extends 'core/auth_base.html' %}
{% block title %}Sign Up - VoiceGuard AI{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">🛡️</div>
            <div class="auth-title">Create Account</div>
            <div class="auth-sub">Join VoiceGuard AI and start detecting deepfakes</div>
        </div>

        <form method="POST" action="{% url 'signup' %}">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-input" placeholder="First Name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-input" placeholder="Last Name" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password1" class="form-input" placeholder="Min. 8 characters" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="password2" class="form-input" placeholder="Re-enter password" required>
            </div>
            <button type="submit" class="btn-auth">🚀 CREATE ACCOUNT</button>
        </form>

        <div class="auth-divider" style="margin-top: 1rem;">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </div>
        <div class="auth-divider" style="margin-top: 0.5rem;">
            <a href="{% url 'index' %}">← Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
