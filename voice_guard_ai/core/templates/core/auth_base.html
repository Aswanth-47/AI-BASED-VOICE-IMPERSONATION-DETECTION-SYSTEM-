{% extends 'core/base.html' %}
{% block extra_css %}
<style>
    .auth-page {
        min-height: calc(100vh - 64px);
        display: flex; align-items: center; justify-content: center;
        padding: 2rem 1.5rem;
    }

    .auth-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%; max-width: 460px;
        backdrop-filter: blur(20px);
        position: relative;
        overflow: hidden;
    }

    .auth-card::before {
        content: '';
        position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--secondary), var(--primary), var(--secondary));
    }

    .auth-logo {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-logo-icon {
        width: 60px; height: 60px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 16px;
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 28px;
        margin-bottom: 1rem;
    }

    .auth-title {
        font-family: 'Orbitron', monospace;
        font-size: 1.4rem; font-weight: 700;
        color: white; text-align: center;
        margin-bottom: 0.35rem;
    }

    .auth-sub {
        color: var(--text-dim); text-align: center;
        font-size: 0.9rem; margin-bottom: 2rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    .form-label {
        display: block;
        color: var(--text); font-size: 0.875rem; font-weight: 600;
        margin-bottom: 0.5rem;
        letter-spacing: 0.3px;
    }

    .form-input {
        width: 100%;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 11px 14px;
        color: white;
        font-family: 'Rajdhani', sans-serif;
        font-size: 1rem;
        outline: none;
        transition: all 0.2s;
    }

    .form-input::placeholder { color: var(--text-dim); }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,245,255,0.08); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .btn-auth {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, var(--primary), #0099cc);
        color: var(--dark);
        border: none; border-radius: 8px;
        font-family: 'Orbitron', monospace;
        font-size: 0.95rem; font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.25s;
        margin-top: 0.5rem;
    }

    .btn-auth:hover { box-shadow: var(--glow); transform: translateY(-1px); }

    .auth-divider {
        text-align: center;
        color: var(--text-dim);
        font-size: 0.875rem;
        margin-top: 1.5rem;
    }

    .auth-divider a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .auth-divider a:hover { text-decoration: underline; }
</style>
{% endblock %}
